version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cyberverse_postgres_dev
    environment:
      POSTGRES_USER: cyberverse
      POSTGRES_PASSWORD: cyberverse123
      POSTGRES_DB: cyberverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    networks:
      - cyberverse_dev

  redis:
    image: redis:7-alpine
    container_name: cyberverse_redis_dev
    ports:
      - "6379:6379"
    networks:
      - cyberverse_dev

volumes:
  postgres_dev:

networks:
  cyberverse_dev:
    driver: bridge
